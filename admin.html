<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 · DY 교육 신청</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
</head>
<body>
  <div id="app-header"></div>

  <main class="container">
    <section class="hero hero-dark">
      <span class="hero-badge">관리자</span>
      <h1>신청 현황 대시보드</h1>
      <p>교육별 신청 현황과 구성원 명단을 한눈에 확인하고 관리하세요.</p>
    </section>

    <section class="section" style="padding-top:8px;">
      <div id="kpi" class="kpi-grid"></div>

      <div class="tabs">
        <button class="tab active" data-tab="trainings">교육별 현황</button>
        <button class="tab" data-tab="targets">대상자 관리</button>
        <button class="tab" data-tab="users">구성원</button>
      </div>

      <div id="tab-trainings" class="tab-panel"></div>
      <div id="tab-targets" class="tab-panel hidden"></div>
      <div id="tab-users" class="tab-panel hidden"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function () {
      renderHeader('admin');
      const user = await requireLogin('admin');
      if (!user) return;

      document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
        document.getElementById('tab-' + t.dataset.tab).classList.remove('hidden');
      });

      await renderAll();

      async function renderAll () {
        await Promise.all([renderKPI(), renderTrainings(), renderTargets(), renderUsers()]);
      }

      /* ---------- KPI ---------- */
      async function renderKPI () {
        const [users, apps, stats] = await Promise.all([
          DAL.listAllUsers(), DAL.listAllApplications(), DAL.trainingStats()
        ]);
        const members = users.filter(u => u.role === 'member');
        const active = apps.filter(a => a.status !== 'cancelled');
        const applied = new Set(active.map(a => a.user_id));
        const notApplied = members.filter(m => !applied.has(m.id)).length;
        const capacity = stats.reduce((a,s) => a + (s.capacity_total||0), 0);
        const filled = stats.reduce((a,s) => a + (s.registered_total||0), 0);
        document.getElementById('kpi').innerHTML = `
          ${kpi('전체 구성원', members.length + '명')}
          ${kpi('신청 인원', applied.size + '명', `미신청 ${notApplied}명`)}
          ${kpi('총 신청 건수', active.length + '건')}
          ${kpi('전체 정원 충원율', (capacity? Math.round(filled/capacity*100):0) + '%', `${filled} / ${capacity}명`)}
        `;
      }
      function kpi (label, value, delta) {
        return `<div class="kpi-card">
          <div class="label">${label}</div>
          <div class="value">${value}</div>
          ${delta ? `<div class="delta">${delta}</div>` : ''}
        </div>`;
      }

      /* ---------- 교육별 현황 (조회 전용) ---------- */
      async function renderTrainings () {
        const [trainings, apps] = await Promise.all([
          DAL.listTrainings(), DAL.listAllApplications()
        ]);
        const blocks = [];
        for (const t of trainings) {
          const sessions = await DAL.listSessions(t.id);
          const totalCap = sessions.reduce((a,s) => a+s.capacity, 0);
          const totalReg = sessions.reduce((a,s) => a+s.registered_count, 0);
          const applied = apps.filter(a => a.training_id === t.id && a.status !== 'cancelled');

          // 차수별 출석자 로딩
          const attByS = {};
          await Promise.all(sessions.map(async s => {
            attByS[s.id] = await DAL.listAttendances(s.id);
          }));

          const sessionRowsHtml = sessions.map(s => {
            const info = capacityInfo(s.registered_count, s.capacity);
            const sApplicants = applied
              .filter(a => a.session_id === s.id)
              .sort((a, b) => String(a.user_name || '').localeCompare(String(b.user_name || ''), 'ko'));

            const sAtt = (attByS[s.id] || []);
            const attByName = {};
            sAtt.forEach(a => {
              const k = String(a.name || '').trim();
              if (k) attByName[k] = a;
            });
            const attendedCnt = sApplicants.filter(a =>
              attByName[String(a.user_name || '').trim()]).length;

            const applicantsTable = sApplicants.length ? `
              <div class="table-wrap" style="max-height:320px; overflow:auto; box-shadow:none; border-radius:8px;">
                <table style="font-size:13px;">
                  <thead>
                    <tr>
                      <th style="width:60px;">순서</th>
                      <th style="width:110px;">이름</th>
                      <th style="width:140px;">회사</th>
                      <th style="width:140px;">소속</th>
                      <th style="width:200px;">이메일</th>
                      <th style="width:140px;">신청 여부</th>
                      <th style="width:180px;">참석 여부</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${sApplicants.map((a, i) => {
                      const att = attByName[String(a.user_name || '').trim()];
                      const nameAttr = String(a.user_name || '').replace(/"/g, '&quot;');
                      const attCell = att
                        ? `<div class="flex gap-8" style="align-items:center; justify-content:center; flex-wrap:nowrap; white-space:nowrap;">
                             <span class="badge badge-blue">출석</span>
                             <button class="btn btn-danger-outline btn-sm att-del" data-id="${att.id}" title="${fmt.date(att.checked_at)} ${fmt.time(att.checked_at)}">취소</button>
                           </div>`
                        : `<div class="flex gap-8" style="align-items:center; justify-content:center; flex-wrap:nowrap; white-space:nowrap;">
                             <span class="text-muted">미출석</span>
                             <button class="btn btn-primary-outline btn-sm att-add" data-sid="${s.id}" data-name="${nameAttr}">참석</button>
                           </div>`;
                      return `
                        <tr>
                          <td>${i+1}</td>
                          <td><b>${a.user_name || ''}</b></td>
                          <td>${a.user_company || '-'}</td>
                          <td>${a.user_dept || '-'}</td>
                          <td style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;" title="${a.user_email || ''}">${a.user_email || ''}</td>
                          <td style="text-align:center; white-space:nowrap;"><span class="badge badge-blue">신청 완료</span></td>
                          <td style="text-align:center;">${attCell}</td>
                        </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            ` : `
              <div class="empty" style="padding:16px;">
                <p class="text-sm text-muted">아직 이 차수에 신청한 분이 없어요.</p>
              </div>
            `;

            return `
              <tr class="session-row" data-sid="${s.id}" style="cursor:pointer;">
                <td style="text-align:center;">
                  <span class="badge badge-blue">${s.round_no}차</span>
                </td>
                <td style="text-align:center;"><b>${s.date_label || fmt.date(s.start_at)}</b><br/><span class="text-sm text-muted">${fmt.time(s.start_at)}~${fmt.time(s.end_at)}</span></td>
                <td style="text-align:center;">${s.region || '-'}</td>
                <td style="text-align:center;">${s.location}</td>
                <td style="text-align:center;">${s.registered_count} / ${s.capacity}명</td>
                <td style="text-align:center;">
                  <div class="progress" style="width:120px; margin:0 auto;"><div class="progress-bar ${info.level==='full'?'full':info.level==='warn'?'warn':''}" style="width:${Math.min(100,(s.registered_count/s.capacity)*100)}%"></div></div>
                </td>
                <td style="text-align:center;">
                  <div class="flex gap-8" style="align-items:center; justify-content:center;">
                    <span class="badge badge-gray">${attendedCnt} / ${sApplicants.length}</span>
                    <button class="btn btn-secondary btn-sm attend-qr" data-sid="${s.id}" data-title="${t.title} · ${s.round_no}차" onclick="event.stopPropagation();">📱 참석 QR</button>
                  </div>
                </td>
              </tr>
              <tr class="session-expand hidden" data-sid="${s.id}">
                <td colspan="7" style="background:var(--gray-50); padding:16px 20px;">
                  <div class="text-sm text-muted mb-8">
                    <b>${s.round_no}차</b> · ${s.date_label || fmt.date(s.start_at)} · ${s.location} · 신청자 <b>${sApplicants.length}명</b> · 출석 <b>${attendedCnt}명</b>
                  </div>
                  ${applicantsTable}
                </td>
              </tr>`;
          }).join('');

          blocks.push(`
            <div class="card mb-24" style="padding:24px;">
              <div class="flex-between mb-16" style="flex-wrap:wrap; gap:12px;">
                <div>
                  <span class="badge badge-gray">${t.category}</span>
                  <div class="bold mt-8" style="font-size:18px;">${t.title}</div>
                </div>
                <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
                  <div>
                    <div class="bold" style="font-size:18px;">${totalReg} / ${totalCap}명</div>
                    <div class="text-sm text-muted">신청 ${applied.length}건</div>
                  </div>
                  <button class="btn btn-secondary btn-sm training-status-download" data-tid="${t.id}" data-title="${t.title}">📥 신청/출석 CSV</button>
                </div>
              </div>
              <div class="progress mb-16">
                <div class="progress-bar ${totalReg>=totalCap?'full': totalReg/totalCap>=0.8?'warn':''}" style="width:${totalCap? Math.min(100, totalReg/totalCap*100):0}%"></div>
              </div>
              <div class="text-sm text-muted mb-8">차수 행을 클릭하면 해당 차수의 신청자/출석자 목록을 펼쳐볼 수 있어요. <b>참석 QR</b> 버튼으로 현장 출석 체크 QR을 띄울 수 있어요.</div>
              <table class="training-status-table" style="text-align:center;">
                <thead>
                  <tr>
                    <th style="text-align:center;">차수</th>
                    <th style="text-align:center;">일시</th>
                    <th style="text-align:center;">지역</th>
                    <th style="text-align:center;">장소</th>
                    <th style="text-align:center;">신청</th>
                    <th style="text-align:center;">충원율</th>
                    <th style="text-align:center;">참석</th>
                  </tr>
                </thead>
                <tbody>
                  ${sessionRowsHtml}
                </tbody>
              </table>
            </div>
          `);
        }
        document.getElementById('tab-trainings').innerHTML = blocks.join('');

        // 차수 행 클릭 시 신청자/출석자 리스트 펼치기/접기
        document.querySelectorAll('#tab-trainings .session-row').forEach(row => {
          row.onclick = () => {
            const sid = row.dataset.sid;
            const expand = document.querySelector(`#tab-trainings .session-expand[data-sid="${sid}"]`);
            if (!expand) return;
            expand.classList.toggle('hidden');
          };
        });

        // 참석 QR 버튼
        document.querySelectorAll('#tab-trainings .attend-qr').forEach(b => {
          b.onclick = (e) => {
            e.stopPropagation();
            openAttendanceQR(b.dataset.sid, b.dataset.title);
          };
        });

        // 교육별 신청/출석 CSV 다운로드
        document.querySelectorAll('#tab-trainings .training-status-download').forEach(b => {
          b.onclick = async (e) => {
            e.stopPropagation();
            const tid = b.dataset.tid;
            const all = await DAL.listAllApplications();
            const filtered = all.filter(a => a.training_id === tid);
            if (!filtered.length) return showToast('아직 신청자가 없어요.');

            const sessionIds = Array.from(new Set(filtered.map(a => a.session_id).filter(Boolean)));
            const attLists = await Promise.all(sessionIds.map(sid => DAL.listAttendances(sid)));
            const attendanceBySessionName = {};
            sessionIds.forEach((sid, i) => {
              (attLists[i] || []).forEach(a => {
                const key = `${sid}::${String(a.name || '').trim()}`;
                attendanceBySessionName[key] = a;
              });
            });

            exportApplicantsToCsv(filtered, {
              filename: `${sanitizeFilename(b.dataset.title)}_신청출석.csv`,
              includeTraining: false,
              attendanceBySessionName
            });
            showToast(`${filtered.length}명의 신청/출석 내역을 다운로드했어요.`);
          };
        });

        // 출석 기록 삭제
        document.querySelectorAll('#tab-trainings .att-del').forEach(b => {
          b.onclick = async (e) => {
            e.stopPropagation();
            openModal({
              title: '출석 기록을 삭제할까요?',
              body: '<p class="text-sm">출석자 명단에서 이 기록이 사라져요.</p>',
              confirmText: '삭제',
              danger: true,
              onConfirm: async () => {
                await DAL.deleteAttendance(b.dataset.id);
                showToast('삭제되었어요.');
                await renderAll();
              }
            });
          };
        });

        // 관리자가 대신 출석 체크
        document.querySelectorAll('#tab-trainings .att-add').forEach(b => {
          b.onclick = async (e) => {
            e.stopPropagation();
            const name = b.dataset.name || '';
            openModal({
              title: `${name} 님을 출석 처리할까요?`,
              body: '<p class="text-sm">뒤늦게 참석한 경우 등 관리자가 대신 출석을 기록합니다.</p>',
              confirmText: '출석 처리',
              onConfirm: async () => {
                try {
                  await DAL.markAttendance(b.dataset.sid, name);
                  showToast(`${name} 님이 출석 처리되었어요.`);
                  await renderAll();
                } catch (err) {
                  showToast(err.message || '출석 처리에 실패했어요.');
                }
              }
            });
          };
        });
      }

      function buildAttendanceUrl (sid) {
        return new URL('attendance.html?sid=' + encodeURIComponent(sid), location.href).href;
      }

      function openAttendanceQR (sid, title) {
        const url = buildAttendanceUrl(sid);
        openModal({
          title: `'${title}' 참석 QR`,
          body: `
            <p class="text-sm text-muted mb-8">
              교육 현장에서 아래 QR을 스캔하면 출석 체크 페이지로 이동해요.<br/>
              참석자는 이름을 입력하고 <b>출석하기</b>를 누르면 출석이 기록됩니다.
            </p>
            <div id="qr-host" style="display:flex; justify-content:center; padding:16px; background:#fff; border:1px solid var(--gray-200); border-radius:12px;"></div>
            <div class="mt-12" style="display:flex; gap:8px; align-items:stretch;">
              <input class="input" id="qr-link" readonly value="${url}" style="flex:1;"/>
              <button type="button" class="btn btn-secondary btn-sm" id="qr-copy">링크 복사</button>
              <a class="btn btn-primary-outline btn-sm" href="${url}" target="_blank" rel="noopener">열기</a>
            </div>
            <p class="text-sm text-muted mt-8">링크를 직접 보내거나, 출석 체크 페이지를 미리 열어두고 싶을 때 사용하세요.</p>
          `,
          confirmText: '닫기',
          cancelText: '닫기',
          onConfirm: async () => {}
        });
        // QR 생성
        setTimeout(() => {
          const host = document.getElementById('qr-host');
          if (host && typeof QRCode !== 'undefined') {
            host.innerHTML = '';
            try {
              new QRCode(host, { text: url, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
            } catch (e) {
              host.innerHTML = `<div class="text-sm text-muted">QR 생성에 실패했어요. 아래 링크를 사용해주세요.</div>`;
            }
          }
          const copyBtn = document.getElementById('qr-copy');
          if (copyBtn) copyBtn.onclick = async () => {
            try {
              await navigator.clipboard.writeText(url);
              showToast('링크가 복사되었어요.');
            } catch (e) {
              const inp = document.getElementById('qr-link');
              inp.select(); document.execCommand('copy');
              showToast('링크가 복사되었어요.');
            }
          };
          // 취소 버튼 숨김 (닫기만 있으면 충분)
          const cancelBtn = document.querySelector('#global-modal #m-cancel');
          if (cancelBtn) cancelBtn.style.display = 'none';
        }, 30);
      }

      /* ---------- 엑셀 내보내기 헬퍼 ---------- */
      function sanitizeFilename (s) {
        return String(s || '').replace(/[\\/:*?"<>|]/g, '_').trim() || 'export';
      }
      function exportApplicantsToCsv (apps, { filename, includeTraining, attendanceBySessionName }) {
        // 신청완료 먼저, 그 다음 취소. 그 안에서는 이름 순으로 정렬.
        const sorted = [...apps].sort((a, b) => {
          const sa = a.status === 'cancelled' ? 1 : 0;
          const sb = b.status === 'cancelled' ? 1 : 0;
          if (sa !== sb) return sa - sb;
          return String(a.user_name || '').localeCompare(String(b.user_name || ''), 'ko');
        });
        const includeAttendance = !!attendanceBySessionName;
        
        const headers = includeTraining
          ? ['순서','이름','회사','소속','이메일','신청여부','신청 교육','차수']
          : ['순서','이름','회사','소속','이메일','신청여부','차수'];
        if (includeAttendance) headers.push('참석여부','출석시각');

        const rows = sorted.map((a, i) => {
          const row = [
            i + 1,
            a.user_name || '',
            a.user_company || '',
            a.user_dept || '',
            a.user_email || '',
            a.status === 'cancelled' ? '취소됨' : '신청완료'
          ];
          if (includeTraining) row.push(a.training_title || '');
          row.push(a.round_no ? `${a.round_no}차` : '');
          if (includeAttendance) {
            const key = `${a.session_id}::${String(a.user_name || '').trim()}`;
            const att = attendanceBySessionName[key];
            row.push(a.status === 'cancelled' ? '-' : (att ? '출석' : '미출석'));
            row.push(att ? `${fmt.date(att.checked_at)} ${fmt.time(att.checked_at)}` : '');
          }
          return row;
        });

        // 엑셀에서 한글이 깨지지 않도록 BOM 추가
        const escapeCsv = (val) => '"' + String(val).replace(/"/g, '""') + '"';
        const csvContent = '\uFEFF' + [
          headers.map(escapeCsv).join(','),
          ...rows.map(row => row.map(escapeCsv).join(','))
        ].join('\n');

        // Blob URL의 고유 주소(UUID)로 파일명이 깨지는 현상을 원천 차단하기 위해 Data URI 직접 주입
        const uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csvContent);
        const a = document.createElement('a');
        a.setAttribute('href', uri);
        a.setAttribute('download', filename);
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => document.body.removeChild(a), 100);
      }

      async function onAdminCancel (appId) {
        openModal({
          title: '이 신청을 취소할까요?',
          body: '<p class="text-sm">관리자가 직접 취소 처리합니다. 대상자에게는 별도 안내가 필요할 수 있어요.</p>',
          confirmText: '취소 처리',
          danger: true,
          onConfirm: async () => {
            await DAL.adminCancelApplication(appId);
            showToast('신청이 취소되었어요.');
            await renderAll();
          }
        });
      }

      /* ---------- 대상자 관리 (차수별) ---------- */
      async function renderTargets () {
        const trainings = await DAL.listTrainings();
        const host = document.getElementById('tab-targets');

        const blocks = [];
        for (const t of trainings) {
          const sessions = await DAL.listSessions(t.id);
          const trainingRows = await DAL.listTargetsDetailed(t.id);

          // 차수별 상세 로딩
          const sessionRowsMap = {};
          await Promise.all(sessions.map(async s => {
            sessionRowsMap[s.id] = await DAL.listSessionTargetsDetailed(s.id);
          }));

          const tAppliedCnt = trainingRows.filter(r => r.applied).length;
          const tNotAppliedCnt = trainingRows.filter(r => !r.applied).length;

          const sessionBlocks = sessions.map(s => {
            const rows = sessionRowsMap[s.id] || [];
            const appliedCnt = rows.filter(r => r.applied).length;
            const autoCnt    = rows.filter(r => r.applied && !r.designated).length;
            const notAppCnt  = rows.filter(r => !r.applied).length;

            return `
              <div class="card mb-16" style="padding:18px; background:var(--gray-50, #f8fafc); box-shadow:none;">
                <div class="flex-between mb-12" style="flex-wrap:wrap; gap:8px;">
                  <div>
                    <span class="badge badge-blue">${s.round_no}차</span>

      async function sendSessionReminder (tid, sid, title) {
        const rows = await DAL.listSessionTargetsDetailed(sid);
        const info = await DAL.getSessionWithTraining(sid);
        const s = info ? info.session : null;
        
        let dateStr = '';
        let locStr = '';
        if (s) {
          dateStr = `${s.date_label || fmt.date(s.start_at)} ${fmt.time(s.start_at)}~${fmt.time(s.end_at)}`;
          locStr = `${s.region ? s.region + ' ' : ''}${s.location || ''}`;
        }
        
        const defaultSubject = `'${title}' 교육 안내드립니다.`;
        const defaultMsg = `안녕하세요. SK디스커버리 기업문화실입니다.

'${title}' 교육이 아래와 같이 진행 예정이오니, 내용 참고하셔서 참여 부탁드립니다.

[교육 안내]
- 일시: ${dateStr}
- 장소: ${locStr}

감사합니다.`;

        const designated = rows.filter(r => r.designated).length;
        const scope = designated
          ? `이 차수의 지정 대상자 <b>${designated}명</b> 중 아직 신청하지 않은 분에게`
          : `이 차수에 지정된 대상자가 없어, 전체 구성원 중 아직 신청하지 않은 분에게`;
        openModal({
          title: `'${title}' 리마인더 발송`,
          body: `<p class="text-sm">${scope} 리마인더 메일이 발송됩니다.</p>
                 <p class="text-sm text-muted mt-8">신청 여부는 <b>이 교육의 모든 차수</b>를 기준으로 판단합니다 (다른 차수에 신청한 분은 제외).</p>
                 <div class="mt-16">
                   <label class="text-sm bold" style="display:block; margin-bottom:8px;">메일 제목 (직접 수정 가능)</label>
                   <input type="text" id="reminder-subj" class="input" style="width:100%; margin-bottom:12px;" value="${defaultSubject.replace(/"/g, '&quot;')}"/>
                   <label class="text-sm bold" style="display:block; margin-bottom:8px;">메일 내용 (직접 수정 가능)</label>
                   <textarea id="reminder-msg" class="input" style="width:100%; height:200px; resize:vertical; font-family:inherit; line-height:1.5;">${defaultMsg}</textarea>
                 </div>`,
          confirmText: '발송하기',
          onConfirm: async () => {
            const subj = document.getElementById('reminder-subj').value;
            const msg = document.getElementById('reminder-msg').value;
            const res = await DAL.sendReminders(tid, { sessionId: sid, subject: subj, messageBody: msg });
            showToast(`${res.sent || 0}명에게 리마인더가 발송되었어요.`);
          }
        });
      }

      async function sendTrainingReminder (tid, title) {
        const rows = await DAL.listTargetsDetailed(tid);
        const sessions = await DAL.listSessions(tid);
        
        const sessionsInfo = sessions.map(s => {
          const d = `${s.date_label || fmt.date(s.start_at)} ${fmt.time(s.start_at)}~${fmt.time(s.end_at)}`;
          const l = `${s.region ? s.region + ' ' : ''}${s.location || ''}`;
          return `[${s.round_no}차] 일시: ${d} / 장소: ${l}`;
        }).join('\n');

        const defaultSubject = `'${title}' 교육 안내드립니다.`;
        const defaultMsg = `안녕하세요. SK디스커버리 기업문화실입니다.

'${title}' 교육이 아래와 같이 진행 예정이오니, 내용 참고하셔서 참여 부탁드립니다.

[교육 안내 (차수별)]
${sessionsInfo}

감사합니다.`;

        const designated = rows.filter(r => r.designated).length;
        const scope = designated
          ? `전체 차수에 지정된 대상자 <b>${designated}명</b> 중 아직 신청하지 않은 분에게`
          : `<b>모든 구성원</b> 중 아직 신청하지 않은 분에게`;
        openModal({
          title: `'${title}' 전체 차수 리마인더 발송`,
          body: `<p class="text-sm">${scope} 리마인더 메일이 발송됩니다.</p>
                 <p class="text-sm text-muted mt-8">모든 차수의 대상자를 합쳐서 중복 없이 1명당 1회 발송돼요.</p>
                 <div class="mt-16">
                   <label class="text-sm bold" style="display:block; margin-bottom:8px;">메일 제목 (직접 수정 가능)</label>
                   <input type="text" id="reminder-subj" class="input" style="width:100%; margin-bottom:12px;" value="${defaultSubject.replace(/"/g, '&quot;')}"/>
                   <label class="text-sm bold" style="display:block; margin-bottom:8px;">메일 내용 (직접 수정 가능)</label>
                   <textarea id="reminder-msg" class="input" style="width:100%; height:200px; resize:vertical; font-family:inherit; line-height:1.5;">${defaultMsg}</textarea>
                 </div>`,
          confirmText: '발송하기',
          onConfirm: async () => {
            const subj = document.getElementById('reminder-subj').value;
            const msg = document.getElementById('reminder-msg').value;
            const res = await DAL.sendReminders(tid, { subject: subj, messageBody: msg });
            showToast(`${res.sent || 0}명에게 리마인더가 발송되었어요.`);
          }
        });
      }

      async function openSessionTargetEditor (sid, title) {
        const current = await DAL.listSessionDesignated(sid);
        const companies = (window.MOCK && MOCK.companies) || [
          'SK디스커버리', 'SK케미칼(GC)', 'SK케미칼(Pharma)',
          'SK가스', 'SK바이오사이언스', 'SK플라즈마'
        ];

        const esc = (s) => String(s == null ? '' : s)
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

        const rowHtml = (r = { name:'', company:'', dept:'', email:'' }) => `
          <tr class="target-row">
            <td><input class="input tr-name"    placeholder="홍길동"      value="${esc(r.name)}"/></td>
            <td>
              <select class="input tr-company">
                <option value="">선택</option>
                ${companies.map(c => `<option value="${esc(c)}" ${c===r.company?'selected':''}>${esc(c)}</option>`).join('')}
              </select>
            </td>
            <td><input class="input tr-dept"    placeholder="기업문화실"   value="${esc(r.dept)}"/></td>
            <td><input class="input tr-email"   placeholder="name@sk.com" value="${esc(r.email)}"/></td>
            <td style="text-align:center;"><button type="button" class="btn btn-danger-outline btn-sm tr-del" title="행 삭제">삭제</button></td>
          </tr>`;

        const initial = current.length ? current : [{ name:'', company:'', dept:'', email:'' }];

        openModal({
          title: `'${title}' 대상자 수정`,
          body: `
            <p class="text-sm text-muted mb-8">
              이 <b>차수</b>의 대상자를 관리합니다. <b>이름, 회사, 소속, 이메일</b>을 입력하세요.<br/>
              저장하면 이 차수의 대상자 List에 반영돼요. (이메일 필수)<br/>
              <span style="color:var(--blue-600);">* 아직 가입하지 않은 대상자는 <b>자동으로 회원가입 처리</b>됩니다.</span>
            </p>
            <div class="table-wrap" style="max-height:56vh; overflow:auto;">
              <table style="min-width:640px;">
                <thead>
                  <tr>
                    <th style="text-align:center; width:120px;">이름</th>
                    <th style="text-align:center; width:160px;">회사</th>
                    <th style="text-align:center; width:140px;">소속</th>
                    <th style="text-align:center;">이메일</th>
                    <th style="text-align:center; width:72px;"></th>
                  </tr>
                </thead>
                <tbody id="target-rows">
                  ${initial.map(rowHtml).join('')}
                </tbody>
              </table>
            </div>
            <div class="mt-12">
              <button type="button" class="btn btn-secondary btn-sm" id="target-add-row">+ 행 추가</button>
              <span class="text-sm text-muted" style="margin-left:8px;">여러 명을 한 번에 추가할 수 있어요.</span>
            </div>
          `,
          confirmText: '저장',
          onConfirm: async () => {
            const rows = Array.from(document.querySelectorAll('#target-rows .target-row')).map(tr => ({
              name:    tr.querySelector('.tr-name').value.trim(),
              company: tr.querySelector('.tr-company').value,
              dept:    tr.querySelector('.tr-dept').value.trim(),
              email:   tr.querySelector('.tr-email').value.trim()
            }));
            const valid = rows.filter(r => r.email);
            // 행을 모두 비워서 저장하면 "이 차수 대상자 전체 삭제" 로 처리
            if (!valid.length && current.length) {
              await DAL.setSessionTargetsDetailed(sid, []);
              showToast('이 차수의 대상자가 모두 삭제되었어요.');
              await renderAll();
              return;
            }
            if (!valid.length) return showToast('이메일을 1명 이상 입력해주세요.');
            const bad = valid.find(r => !/^[\w.+-]+@[\w-]+\.[\w.-]+$/.test(r.email));
            if (bad) return showToast(`이메일 형식을 확인해주세요: ${bad.email}`);
            await DAL.setSessionTargetsDetailed(sid, valid);
            showToast(`${valid.length}명의 대상자가 저장되었고, 미가입자는 자동으로 회원가입 처리됐어요.`);
            await renderAll();
          }
        });

        const tbody = document.getElementById('target-rows');
        const attachDel = () => {
          tbody.querySelectorAll('.tr-del').forEach(b => {
            b.onclick = () => {
              const rows = tbody.querySelectorAll('.target-row');
              if (rows.length <= 1) {
                b.closest('.target-row').querySelectorAll('input,select').forEach(el => el.value = '');
              } else {
                b.closest('.target-row').remove();
              }
            };
          });
        };
        attachDel();
        document.getElementById('target-add-row').onclick = () => {
          tbody.insertAdjacentHTML('beforeend', rowHtml());
          attachDel();
        };
      }

          if (!file) return;
          try {
            const parsed = await parseTargetsFromFile(file);
            if (!parsed.rows.length) return showToast('파일에서 이메일을 찾지 못했어요.');

            const { rows, detected } = parsed;
            const withProfile = rows.filter(r => r.name || r.company || r.dept).length;

            const preview = rows.slice(0, 20).map(r => `
              <tr>
                <td style="padding:4px 8px; text-align:center;">${r.name || '<span class="text-muted">-</span>'}</td>
                <td style="padding:4px 8px; text-align:center;">${r.company || '<span class="text-muted">-</span>'}</td>
                <td style="padding:4px 8px; text-align:center;">${r.dept || '<span class="text-muted">-</span>'}</td>

                             <th style="padding:4px 8px; text-align:center;">회사</th>
                             <th style="padding:4px 8px; text-align:center;">소속</th>
                             <th style="padding:4px 8px; text-align:center;">이메일</th>
                           </tr>
                         </thead>
                         <tbody>${preview}</tbody>
                       </table>
                       ${rows.length > 20 ? `<div class="text-muted text-sm" style="padding:8px;">… 외 ${rows.length-20}명</div>` : ''}
                     </div>
                     <p class="text-sm text-muted mt-8">기존 대상자는 덮어쓰기 됩니다. 이메일만 있는 행은 이름/회사/소속이 비워진 채 저장되며, 나중에 '대상자 수정'에서 채울 수 있어요.<br/>
                     <span style="color:var(--blue-600);">* 업로드된 대상자 중 아직 가입하지 않은 분은 <b>자동으로 회원가입 처리</b>됩니다.</span></p>`,
              confirmText: '저장',
              onConfirm: async () => {
                await DAL.setSessionTargetsDetailed(sid, rows);
                showToast(`${rows.length}명의 대상자가 저장되었고, 미가입자는 자동으로 회원가입 처리됐어요.`);
                await renderAll();
              }
            });
          } catch (err) {
            showToast(err.message || '파일을 읽을 수 없어요.');
          } finally {
            input.value = '';
          }
        };
        input.click();
      }

      /**
       * CSV 파일에서 [이름, 회사, 소속, 이메일] 행을 추출.
       */
      function parseTargetsFromFile (file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              let text = ev.target.result;
              // Remove BOM if present
              if (text.charCodeAt(0) === 0xFEFF) {
                text = text.slice(1);
              }
              const lines = text.split(/\r?\n/).filter(l => l.trim());
              if (!lines.length) return resolve({ rows: [], detected: {} });

              // Simple CSV parser supporting quotes
              const parseCsvLine = (line) => {
                const result = [];
                let curr = '';
                let inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                  const c = line[i];
                  if (c === '"') {
                    if (inQuotes && line[i+1] === '"') { curr += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                  } else if (c === ',' && !inQuotes) {
                    result.push(curr); curr = '';
                  } else {
                    curr += c;
                  }
                }
                result.push(curr);
                return result;
              };

              const raw = lines.map(parseCsvLine);
              const emailRe = /[\w.+-]+@[\w-]+\.[\w.-]+/;
              
              const hdr = raw[0].map(c => String(c).trim().toLowerCase());
              const findCol = (keys) => {
                const idx = hdr.findIndex(h => keys.some(k => h === k || h.includes(k)));
                return idx >= 0 ? idx : null;
              };
              let emailCol   = findCol(['email', '메일', '이메일']);
              let nameCol    = findCol(['name', '이름', '성명']);
              let companyCol = findCol(['company', '회사', '소속사']);
              let deptCol    = findCol(['dept', 'department', '부서', '소속', '팀']);

              const hasHeader = emailCol !== null || nameCol !== null || companyCol !== null || deptCol !== null;

              if (!hasHeader) {
                const cols = raw[0].length;
                if (cols >= 4) {
                  nameCol = 0; companyCol = 1; deptCol = 2; emailCol = 3;
                } else {
                  emailCol = null;
                }
              }

              const dataRows = hasHeader ? raw.slice(1) : raw;
              const seen = new Set();
              const out = [];
              const pick = (row, col) => (col !== null && col !== undefined) ? String(row[col] || '').trim() : '';

              dataRows.forEach(row => {
                let email = pick(row, emailCol).toLowerCase();
                if (!emailRe.test(email)) {
                  for (const c of row) {
                    const mm = String(c).match(emailRe);
                    if (mm) { email = mm[0].toLowerCase(); break; }
                  }
                }
                if (!email || !emailRe.test(email) || seen.has(email)) return;
                seen.add(email);
                out.push({
                  email,
                  name:    pick(row, nameCol),
                  company: pick(row, companyCol),
                  dept:    pick(row, deptCol)
                });
              });

              resolve({
                rows: out,
                detected: {
                  이름: nameCol !== null ? (nameCol + 1) : null,
                  회사: companyCol !== null ? (companyCol + 1) : null,
                  소속: deptCol !== null ? (deptCol + 1) : null,
                  이메일: emailCol !== null ? (emailCol + 1) : null
                }
              });
            } catch (e) { reject(e); }
          };
          reader.onerror = reject;
          reader.readAsText(file, 'utf-8');
        });
      }

      /* ---------- 구성원 ---------- */
      async function renderUsers () {
        const [users, apps] = await Promise.all([
          DAL.listAllUsers(), DAL.listAllApplications()
        ]);
        const activeApps = apps.filter(a => a.status !== 'cancelled');
        const appsByUser = {};
        activeApps.forEach(a => {
          if (!appsByUser[a.user_id]) appsByUser[a.user_id] = [];
          appsByUser[a.user_id].push(a);
        });
        const host = document.getElementById('tab-users');
        host.innerHTML = `
          <div class="flex-between mb-16">
            <input class="input" id="user-search" placeholder="이름, 회사, 부서, 이메일로 검색" style="max-width:320px;"/>
            <span class="text-sm text-muted">총 ${users.length}명</span>
          </div>
          <div class="table-wrap">
            <table id="user-table">
              <thead><tr><th>이름</th><th>회사</th><th>부서</th><th>이메일</th><th>권한</th><th style="width:140px;">신청 건수</th></tr></thead>
              <tbody>
                ${users.map(u => {
                  const list = appsByUser[u.id] || [];
                  const cnt = list.length;
                  const btn = cnt > 0
                    ? `<button class="btn btn-secondary btn-sm user-apps-toggle" data-uid="${u.id}" style="display:inline-flex; align-items:center; gap:6px;">
                         <span class="user-apps-caret" style="display:inline-block; transition:transform 0.15s;">▶</span>
                         ${cnt}건
                       </button>`
                    : `<span class="text-muted">0건</span>`;
                  const rowsHtml = list.map(a => `
                    <div class="flex-between" style="padding:8px 12px; background:#fff; border:1px solid var(--gray-200); border-radius:8px; gap:8px; flex-wrap:wrap;">
                      <div>
                        <span class="badge badge-gray" style="margin-right:4px;">${a.training_category || ''}</span>
                        <b>${a.training_title || ''}</b>
                        <span class="badge badge-blue" style="margin-left:6px;">${a.round_no || ''}차</span>
                      </div>
                      <div class="text-sm text-muted">
                        ${a.date_label || fmt.date(a.start_at)} · ${fmt.time(a.start_at)}~${fmt.time(a.end_at)} · ${a.location || ''}
                      </div>
                    </div>`).join('');
                  const expand = cnt > 0 ? `
                    <tr class="user-apps-expand hidden" data-uid="${u.id}">
                      <td colspan="6" style="background:var(--gray-50); padding:12px 20px;">
                        <div class="text-sm text-muted mb-8"><b>${u.name}</b> 님의 신청 내역 ${cnt}건</div>
                        <div class="flex" style="flex-direction:column; gap:6px;">
                          ${rowsHtml}
                        </div>
                      </td>
                    </tr>` : '';
                  return `
                    <tr class="user-row" data-uid="${u.id}" data-text="${(u.name+' '+(u.company||'')+' '+u.dept+' '+u.email).toLowerCase()}">
                      <td><b>${u.name}</b></td>
                      <td>${u.company || ''}</td>
                      <td>${u.dept}</td>
                      <td>${u.email}</td>
                      <td>${u.role === 'admin'
                        ? '<span class="badge badge-blue">관리자</span>'
                        : '<span class="badge badge-gray">구성원</span>'}</td>
                      <td>${btn}</td>
                    </tr>
                    ${expand}
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
        document.getElementById('user-search').oninput = (e) => {
          const q = e.target.value.toLowerCase();
          document.querySelectorAll('#user-table tbody tr.user-row').forEach(tr => {
            const match = tr.dataset.text.includes(q);
            tr.style.display = match ? '' : 'none';
            const expand = document.querySelector(`#user-table tbody tr.user-apps-expand[data-uid="${tr.dataset.uid}"]`);
            if (expand && !match) expand.classList.add('hidden');
            if (expand) expand.style.display = match ? '' : 'none';
          });
        };
        host.querySelectorAll('.user-apps-toggle').forEach(b => {
          b.onclick = (e) => {
            e.stopPropagation();
            const uid = b.dataset.uid;
            const expand = host.querySelector(`tr.user-apps-expand[data-uid="${uid}"]`);
            const caret = b.querySelector('.user-apps-caret');
            if (!expand) return;
            const wasHidden = expand.classList.contains('hidden');
            expand.classList.toggle('hidden');
            if (caret) caret.style.transform = wasHidden ? 'rotate(90deg)' : 'rotate(0deg)';
          };
        });
      }
    })();
  </script>
