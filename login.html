<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 · DY 교육 신청</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="background:#fff;">
  <main class="container-narrow" style="max-width:420px; padding-top:80px;">
    <div class="logo mb-24">
      <span class="logo-badge">DY</span>
      <span>교육 신청</span>
    </div>

    <h1 style="font-size:28px; font-weight:800; letter-spacing:-0.03em;">로그인</h1>
    <p class="text-muted mt-8">SK Discovery 사내 메일로 로그인하세요.</p>

    <div class="mt-32">
      <div class="form-row">
        <label>이메일</label>
        <input class="input" id="email" placeholder="name@skdiscovery.com" />
      </div>
      <button class="btn btn-primary btn-full btn-lg mt-16" id="signin">로그인</button>
      <div class="text-sm text-muted mt-16" style="text-align:center;">
        아직 계정이 없나요?
        <a href="signup.html" style="color:var(--blue-600); font-weight:600;">회원가입</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('signin').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) return showToast('이메일을 입력하세요.');
      
      try {
        if (window.USE_SUPABASE) {
          // 비밀번호 없이 이메일만으로 로그인하도록 고정 비밀번호 전송
          await DAL.signIn(email, 'DyEdu2026!');
        } else {
          const u = MOCK.users.find(x => x.email === email);
          if (!u) {
            showToast('등록되지 않은 이메일이에요. 회원가입으로 이동합니다.');
            setTimeout(() => { location.href = 'signup.html?email=' + encodeURIComponent(email); }, 900);
            return;
          }
          await DAL.signInMock(email);
        }
        location.href = 'index.html';
      } catch (err) {
        showToast(err.message || '로그인에 실패했습니다.');
      }
    };
  </script>
</body>
</html>
