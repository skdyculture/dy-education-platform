<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인 · DY 교육 신청</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="background:#fff;">
  <main class="container-narrow" style="max-width:420px; padding-top:80px;">
    <div class="logo mb-24">
      <span class="logo-badge">DY</span>
      <span>교육 신청</span>
    </div>

    <h1 style="font-size:28px; font-weight:800; letter-spacing:-0.03em;">로그인</h1>
    <p class="text-muted mt-8">SK Discovery 사내 메일로 로그인하세요.</p>

    <div class="mt-32">
      <div class="form-row">
        <label>이메일</label>
        <input class="input" id="email" placeholder="name@skdiscovery.com" />
      </div>
      <div class="form-row mt-16">
        <label>비밀번호</label>
        <input type="password" class="input" id="password" placeholder="비밀번호를 입력하세요" />
      </div>
      <button class="btn btn-primary btn-full btn-lg mt-16" id="signin">로그인</button>
      <div class="text-sm text-muted mt-16" style="text-align:center;">
        아직 계정이 없나요?
        <a href="signup.html" style="color:var(--blue-600); font-weight:600;">회원가입</a>
      </div>
    </div>

    <div class="mt-32">
      <div class="text-sm text-muted mb-8">빠른 계정 선택 (데모)</div>
      <div id="accounts" class="flex" style="flex-direction:column; gap:8px;"></div>
    </div>

    <div class="mt-32 text-sm text-muted" style="text-align:center;">
      <button id="reset" style="color:var(--gray-500); text-decoration:underline;">데모 데이터 초기화</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>
    const acc = document.getElementById('accounts');
    acc.innerHTML = MOCK.users.map(u => `
      <button class="card clickable" data-email="${u.email}" style="padding:14px 16px; display:flex; justify-content:space-between; align-items:center;">
        <span class="flex gap-12" style="align-items:center;">
          <span class="user-chip"><span class="avatar">${u.name.slice(0,1)}</span></span>
          <span>
            <div class="bold">${u.name} <span class="badge ${u.role==='admin'?'badge-blue':'badge-gray'}" style="margin-left:6px;">${u.role==='admin'?'관리자':'구성원'}</span></div>
            <div class="text-sm text-muted">${u.dept} · ${u.email}</div>
          </span>
        </span>
        <span style="color:var(--blue-500); font-weight:700;">→</span>
      </button>
    `).join('');

    acc.querySelectorAll('button').forEach(b => {
      b.onclick = async () => {
        try {
          if (window.USE_SUPABASE) {
            await DAL.signIn(b.dataset.email, 'DyEdu2026!');
          } else {
            await DAL.signInMock(b.dataset.email);
          }
          location.href = 'index.html';
        } catch (err) {
          showToast(err.message || '로그인 실패');
        }
      };
    });

    document.getElementById('signin').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const pwdEl = document.getElementById('password');
      const password = pwdEl ? pwdEl.value.trim() : 'DyEdu2026!';
      if (!email) return showToast('이메일을 입력하세요.');
      
      try {
        if (window.USE_SUPABASE) {
          await DAL.signIn(email, password || 'DyEdu2026!');
        } else {
          const u = MOCK.users.find(x => x.email === email);
          if (!u) {
            showToast('등록되지 않은 이메일이에요. 회원가입으로 이동합니다.');
            setTimeout(() => { location.href = 'signup.html?email=' + encodeURIComponent(email); }, 900);
            return;
          }
          await DAL.signInMock(email);
        }
        location.href = 'index.html';
      } catch (err) {
        showToast(err.message || '로그인에 실패했습니다.');
      }
    };

    document.getElementById('reset').onclick = () => {
      MOCK.reset();
      localStorage.removeItem('dy_current_user');
      showToast('데모 데이터를 초기화했어요.');
      setTimeout(() => location.reload(), 600);
    };
  </script>
</body>
</html>
